<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1 class="title">
        Muhammad Adeen Shaikh |
            <i class="fa-solid fa-cloud"></i> Weather App
    </h1>

    <div class="container">
        <div class="cityweather">
            <div id="city"></div>
        <img id="weather-icon">
        </div>
        <div id="temp"></div>
        <div id="desc"></div>
    </div>

    <div class="search">
        <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text" id="inputbox" placeholder="Search city...">

                <button id="btn">
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </button>
            </div>
    </div>
    <br><br>
    <h2>Popular Cities</h2>
    <br>
    <div class="popular-cities">
         <div class="city-card">
            <h5>London
            <span class="city-temp" id="london"></span>
            </h5>
            <img src="Images/Tower_Bridge_at_Dawn.jpg">
        </div>
        <hr>
        <div class="city-card">
               <h5>Paris
                <span class="city-temp" id="paris"></span>
               </h5>
            <img src="Images/1000_Eiffel_tower_night_illumination_by_Pierre_Bideau_in_Paris_Photo_by_Giles_Laurent.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>New York
                <span class="city-temp" id="new-york"></span>
            </h5>
            <img src="Images/images.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Jeddah
                <span class="city-temp" id="jeddah"></span>
            </h5>
            <img src="Images/jeddah-city.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Medinah
                <span class="city-temp" id="medinah"></span>
            </h5>
            <img src="Images/site-Prophets-Mosque-Medina-Saudi-Arabia-Mecca.webp">
        </div>
        <hr>
        <div class="city-card">
            <h5>Mecca
                <span class="city-temp" id="mecca"></span>
            </h5>
            <img src="Images/starry-mecca-night-stockcake.webp">
        </div>
        <hr>
        <div class="city-card">
            <h5>Karachi
                <span class="city-temp" id="karachi"></span>
            </h5>
            <img src="Images/Karachi.avif">
        </div>
        <hr>
        <div class="city-card">
            <h5>Islamabad
                <span class="city-temp" id="islamabad"></span>
            </h5>
            <img src="Images/images (1).jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Lahore
                <span class="city-temp" id="lahore"></span>
            </h5>
            <img src="Images/Lahore_Fort_view_from_Baradari.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Dubai
                <span class="city-temp" id="dubai"></span>
            </h5>
            <img src="Images/Dubai-Scenery.webp">
        </div>
        <hr>
        <div class="city-card">
            <h5>Istanbul
                <span class="city-temp" id="istanbul"></span>
            </h5>
            <img src="Images/BCC-2023-EXPLORER-Istanbul-Fun-things-to-do-in-Istanbul-HEADER_MOBILE.webp">
        </div>
        <hr>
        <div class="city-card">
            <h5>Berlin
                <span class="city-temp" id="berlin"></span>
            </h5>
            <img src="Images/berlin.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Sydney
                <span class="city-temp" id="sydney"></span>
            </h5>
            <img src="Images/sydney.avif">
        </div>
        <hr>
        <div class="city-card">
            <h5>Chicago
                <span class="city-temp" id="chicago"></span>
            </h5>
            <img src="Images/chicago-skyline-1024x683.jpeg">
        </div>
         <hr>
        <div class="city-card">
            <h5>Delhi
                <span class="city-temp" id="delhi"></span>
            </h5>
            <img src="Images/delhi.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Mumbai
                <span class="city-temp" id="mumbai"></span>
            </h5>
            <img src="Images/images-mumbai.jpg">
        </div>
        <hr>
        <div class="city-card">
            <h5>Tokyo
                <span class="city-temp" id="tokyo"></span>
            </h5>
            <img src="Images/images (2).jpg">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
